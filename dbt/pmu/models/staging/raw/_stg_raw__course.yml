version: 2

models:
  - name: stg_raw__course
    description: "Staging des courses PMU à partir du JSON brut programme/reunions/courses"
    columns:
      - name: raw_id
        description: "Identifiant technique de la ligne raw source"
        tests:
          - not_null

      - name: source_file
        description: "Nom du fichier source ingéré"
        tests:
          - not_null

      - name: file_hash
        description: "Hash du fichier source"
        tests:
          - not_null

      - name: ingested_at
        description: "Horodatage d’ingestion dans la table raw"
        tests:
          - not_null

      - name: date_str
        description: "Date contenue dans le nom du fichier"
        tests:
          - not_null

      - name: reunion_num_officiel
        description: "Numéro officiel de la réunion"
        tests:
          - not_null

      - name: reunion_num_externe
        description: "Numéro externe de la réunion"

      - name: reunion_nature
        description: "Nature de la réunion, par exemple DIURNE ou SEMINOCTURNE"

      - name: reunion_hippodrome_code
        description: "Code hippodrome au niveau réunion"

      - name: reunion_hippodrome_libelle_court
        description: "Libellé court de l’hippodrome au niveau réunion"

      - name: reunion_pays_code
        description: "Code pays de la réunion"

      - name: reunion_pays_libelle
        description: "Libellé pays de la réunion"

      - name: course_num_reunion
        description: "Numéro de réunion porté par l’objet course"
        tests:
          - not_null

      - name: course_num_ordre
        description: "Numéro d’ordre de la course dans la réunion"
        tests:
          - not_null

      - name: course_num_externe
        description: "Numéro externe de la course"

      - name: course_heure_depart
        description: "Heure de départ de la course au format epoch millisecondes"

      - name: course_libelle
        description: "Libellé long de la course"

      - name: course_libelle_court
        description: "Libellé court de la course"

      - name: course_montant_prix
        description: "Montant du prix de la course"

      - name: course_parcours
        description: "Parcours de la course"

      - name: course_distance
        description: "Distance de la course"

      - name: course_distance_unit
        description: "Unité de distance de la course"

      - name: course_corde
        description: "Sens de corde de la course"

      - name: course_discipline
        description: "Discipline de la course"

      - name: course_specialite
        description: "Spécialité de la course"

      - name: course_categorie_particularite
        description: "Catégorie ou particularité de la course"

      - name: course_condition_age
        description: "Condition d’âge de la course"

      - name: course_condition_sexe
        description: "Condition de sexe de la course"

      - name: course_nb_declares_partants
        description: "Nombre de partants déclarés"

      - name: course_montant_total_offert
        description: "Montant total offert"

      - name: course_montant_offert_1er
        description: "Montant offert au 1er"

      - name: course_montant_offert_2eme
        description: "Montant offert au 2eme"

      - name: course_montant_offert_3eme
        description: "Montant offert au 3eme"

      - name: course_montant_offert_4eme
        description: "Montant offert au 4eme"

      - name: course_montant_offert_5eme
        description: "Montant offert au 5eme"

      - name: course_conditions
        description: "Conditions textuelles de la course"

      - name: course_num_course_dedoublee
        description: "Numéro de course dédoublée"

      - name: course_statut
        description: "Statut de la course"

      - name: course_categorie_statut
        description: "Catégorie de statut de la course"

      - name: course_duree_course
        description: "Durée de la course"

      - name: course_rapports_definitifs_disponibles
        description: "Indique si les rapports définitifs sont disponibles"

      - name: course_is_arrivee_definitive
        description: "Indique si l’arrivée est définitive"

      - name: course_is_depart_imminent
        description: "Indique si le départ est imminent"

      - name: course_replay_disponible
        description: "Indique si le replay est disponible"

      - name: course_hippodrome_code
        description: "Code hippodrome au niveau course"

      - name: course_hippodrome_libelle_court
        description: "Libellé court de l’hippodrome au niveau course"

      - name: course_has_eparis
        description: "Indique si la course a EParis"

      - name: course_paris_json
        description: "Objet JSON complet des paris"

      - name: course_ordre_arrivee_json
        description: "Objet JSON complet des arrivees"

      - name: course_id_naturel
        description: "Identifiant naturel de la course construit à partir de la date programme, de la réunion et du numéro d’ordre"
        tests:
          - not_null
          - unique

      - name: course_json
        description: "Objet JSON complet de la course"
